name: Claim OCI A1 Instance

on:
  schedule:
    - cron: '*/5 * * * *'   # Every 5 minutes — free on public repos
  workflow_dispatch:          # Also triggerable manually from GitHub UI

jobs:
  claim:
    runs-on: ubuntu-latest
    timeout-minutes: 5        # Allows full 260-second loop duration per 5-min cron run

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run claim script
        env:
          OCI_TENANCY_OCID:     ${{ secrets.OCI_TENANCY_OCID }}
          OCI_USER_OCID:        ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT:      ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY:      ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_REGION:           ${{ secrets.OCI_REGION }}
          OCI_COMPARTMENT_ID:   ${{ secrets.OCI_COMPARTMENT_ID }}
          OCI_SUBNET_ID:        ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID:         ${{ secrets.OCI_IMAGE_ID }}
          OCI_SSH_PUBLIC_KEY:   ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_INSTANCE_NAME:    xeli-a1-staging
          NTFY_URL:             ${{ secrets.NTFY_URL }}
        run: |
          chmod +x claim.sh
          ./claim.sh
